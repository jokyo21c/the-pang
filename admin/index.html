<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PANG Admin — 로그인</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo__mark">⚡</div>
            <div>
                <div class="login-logo__text">THE PANG</div>
                <div class="login-logo__sub">Admin Panel</div>
            </div>
        </div>

        <h1>관리자 로그인</h1>
        <p>콘텐츠 관리를 위해 로그인하세요.</p>

        <div class="login-error" id="loginError">
            <i class="ri-error-warning-line"></i> <span id="loginErrorMsg">비밀번호가 올바르지 않습니다.</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="adminEmail">관리자 이메일</label>
                <input type="email" id="adminEmail" class="form-control" placeholder="admin@thepang.kr" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="adminPw">비밀번호</label>
                <input type="password" id="adminPw" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <i class="ri-login-box-line"></i> 로그인
            </button>
        </form>

        <!-- 로딩 표시 -->
        <div id="loginLoading" style="display:none; text-align:center; margin-top:16px;">
            <div style="display:inline-block;width:24px;height:24px;border:3px solid rgba(123,47,255,.2);border-top-color:#7b2fff;border-radius:50%;animation:spin .6s linear infinite;"></div>
            <p style="margin-top:8px;font-size:13px;color:var(--text-secondary);">인증 확인 중...</p>
        </div>

        <p style="margin-top:24px;font-size:11px;color:var(--text-muted);text-align:center;">
            © 2025 THE PANG. 관리자 전용 페이지입니다.
        </p>
    </div>
</div>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="js/supabase-admin.js"></script>

<script>
    const loginForm    = document.getElementById('loginForm');
    const loginError   = document.getElementById('loginError');
    const loginErrorMsg= document.getElementById('loginErrorMsg');
    const loginBtn     = document.getElementById('loginBtn');
    const loginLoading = document.getElementById('loginLoading');

    // 이미 로그인 중이면 대시보드로 리다이렉트
    (async () => {
        loginLoading.style.display = 'block';
        loginForm.style.display = 'none';

        try {
            const isAdmin = await AdminAuth.isAdmin();
            if (isAdmin) {
                window.location.href = 'dashboard.html';
                return;
            }
        } catch (e) {
            // 세션 없음 — 로그인 폼 표시
        }

        loginLoading.style.display = 'none';
        loginForm.style.display = 'block';
    })();

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.classList.remove('show');

        const email = document.getElementById('adminEmail').value.trim();
        const pw    = document.getElementById('adminPw').value;

        if (!email || !pw) return;

        // 버튼 비활성화
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin .6s linear infinite;display:inline-block;"></i> 로그인 중...';

        try {
            await AdminAuth.login(email, pw);
            window.location.href = 'dashboard.html';
        } catch (err) {
            loginErrorMsg.textContent = err.message || '로그인에 실패했습니다.';
            loginError.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="ri-login-box-line"></i> 로그인';
        }
    });
</script>
</body>
</html>
