        if (window.innerWidth >= 768) {
            const pcBtn = document.getElementById('docModalClosePc');
            if (pcBtn) pcBtn.style.display = 'flex';
        }

        // 서명 캔버스 초기화
        setTimeout(() => {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = 240;
            ctx.scale(2, 2);
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            let drawing = false;
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return { x, y };
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => {
                e.preventDefault(); drawing = true;
                const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
            };
            canvas.onmousemove = canvas.ontouchmove = (e) => {
                if (!drawing) return; e.preventDefault();
                const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
            };
            canvas.onmouseup = canvas.onmouseleave = canvas.ontouchend = () => { drawing = false; };
        }, 100);
    };

    /* ── 전자서명: 캔버스 초기화 ── */
    window.clearSignature = function() {
        const canvas = document.getElementById('signatureCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    /* ── 전자서명: 저장 ── */
    window.saveSignature = async function(orderId) {
        const canvas = document.getElementById('signatureCanvas');
        if (!canvas) return;
        // 빈 캔버스 체크
        const ctx = canvas.getContext('2d');
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let blank = true;
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] !== 0) { blank = false; break; }
        }
        if (blank) { alert('서명을 입력해주세요.'); return; }

        try {

    };

    window.closeBizModal = function() {
        document.getElementById('bizModalOverlay').classList.remove('show');
    };

    window.switchBizTab = function(tab) {
        document.querySelectorAll('.biz-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.biz-tab-panel').forEach(p => p.classList.remove('active'));
        if (tab === 'upload') {
            document.querySelectorAll('.biz-tab')[0].classList.add('active');
            document.getElementById('bizTabUpload').classList.add('active');
        } else {
            document.querySelectorAll('.biz-tab')[1].classList.add('active');
            document.getElementById('bizTabManual').classList.add('active');
        }
    };

    // 드롭존 이벤트
    const dropzone = document.getElementById('bizDropzone');
    const fileInput = document.getElementById('bizFileInput');
    if (dropzone && fileInput) {
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault(); dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleBizFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleBizFile(e.target.files[0]); });
    }

    function handleBizFile(file) {
        const validTypes = ['image/jpeg','image/png','image/gif','image/webp','application/pdf'];
        if (!validTypes.includes(file.type)) { alert('JPG, PNG 또는 PDF 파일만 업로드 가능합니다.'); return; }
        if (file.size > 10 * 1024 * 1024) { alert('파일 크기는 10MB 이하여야 합니다.'); return; }
        _bizSelectedFile = file;
        document.getElementById('bizFileName').textContent = file.name;
        const thumb = document.getElementById('bizFileThumb');
        if (file.type.startsWith('image/')) {
            thumb.src = URL.createObjectURL(file); thumb.style.display = 'block';
        } else {
            thumb.style.display = 'none';
        }
        document.getElementById('bizFilePreview').style.display = 'flex';
    }

    window.removeBizFile = function() {
        _bizSelectedFile = null;
        document.getElementById('bizFilePreview').style.display = 'none';
        document.getElementById('bizFileInput').value = '';
    };

    // 간편 첨부 제출
    window.submitBizUpload = async function() {
        const orderId = document.getElementById('bizOrderId').value;
        const phone = document.getElementById('bizUploadPhone').value.trim();
        if (!_bizSelectedFile) { alert('사업자등록증 파일을 첨부해주세요.'); return; }
        if (!phone) { alert('담당자 연락처를 입력해주세요.'); return; }

        const btn = document.getElementById('bizUploadSubmitBtn');
        btn.disabled = true; btn.textContent = '업로드 중...';
        
        let fileUrl = '';
        try {
            fileUrl = await PangOrders.uploadBusinessLicense(_bizSelectedFile);
        } catch (e) {
            btn.disabled = false; btn.textContent = '제출하기';
            alert('❌ 파일 처리 실패: ' + (e.message || JSON.stringify(e)));
            return;
        }

        try {
            btn.textContent = '정보 저장 중...';
            await PangOrders.submitContractInfo(orderId, {
                biz_license_url: fileUrl,
                contact_name: document.getElementById('bizUploadName').value,
                contact_phone: phone,
                contact_email: document.getElementById('bizUploadEmail').value
            });
            alert('✅ 사업자 정보가 제출되었습니다.\n담당 PD가 확인 후 계약서를 세팅해 드립니다.');
            closeBizModal();
            location.reload();
        } catch (e) {
            btn.disabled = false; btn.textContent = '제출하기';
            alert('❌ 데이터 저장 실패 (DB): ' + (e.message || JSON.stringify(e)));
        }
    };

    // 직접 입력 제출
    window.submitBizManual = async function() {
        const orderId = document.getElementById('bizOrderId').value;
        const company = document.getElementById('bizManualCompany').value.trim();
        const ceo = document.getElementById('bizManualCeo').value.trim();
        const bizNum = document.getElementById('bizManualBizNum').value.trim();
        const address = document.getElementById('bizManualAddress').value.trim();
        const phone = document.getElementById('bizManualPhone').value.trim();

        if (!company) { alert('업체명을 입력해주세요.'); return; }
        if (!ceo) { alert('대표자 성명을 입력해주세요.'); return; }
        if (!bizNum) { alert('사업자등록번호를 입력해주세요.'); return; }
        if (!address) { alert('업체 주소를 입력해주세요.'); return; }
        if (!phone) { alert('담당자 연락처를 입력해주세요.'); return; }

        const btn = document.getElementById('bizManualSubmitBtn');
        btn.disabled = true; btn.textContent = '저장 중...';
        try {
            await PangOrders.submitContractInfo(orderId, {
                customer_business: {
                    company_name: company,
                    ceo_name: ceo,
                    biz_number: bizNum,
                    address: address,
                    biz_type: document.getElementById('bizManualBizType').value.trim(),
                    contact_name: document.getElementById('bizManualName').value,
                    contact_phone: phone,
                    contact_email: document.getElementById('bizManualEmail').value
                }
            });
            alert('✅ 사업자 정보가 저장되었습니다.\n계약서 보기/PDF에서 정보를 확인할 수 있습니다.');
            closeBizModal();
            location.reload();
        } catch (e) {
            btn.disabled = false; btn.textContent = '제출하기';
            alert('❌ 데이터 저장 실패 (DB): ' + (e.message || JSON.stringify(e)));
        }
    };
    } catch (err) {
        console.error('[mypage] fatal error:', err);
        if (container) {
            container.innerHTML = `
                <div class="mypage-empty">
                    <i class="ri-error-warning-line"></i>
                    <p>오류가 발생했습니다.</p>
                    <p style="font-size:12px; color:#666;">${err.message || ''}</p>
                </div>
            `;
        }
    } finally {
        // 로딩 표시 제거 보장
        const loader = container?.querySelector('.mypage-loading');
        if (loader) loader.style.display = 'none';
    }
})();
</script>
</body>
</html>
