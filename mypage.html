<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | THE PANG</title>
    <meta name="description" content="THE PANG 마이페이지 — 견적 진행 현황, 견적서/계약서 확인">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Pretendard Variable', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }

        /* ── Header ── */
        .mypage-header {
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(123,47,255,0.3);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .mypage-header__logo {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #7b2fff;
        }
        .mypage-header__nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .mypage-header__link {
            font-size: 14px;
            color: #888;
            transition: color 0.2s;
        }
        .mypage-header__link:hover { color: #fff; }
        .mypage-header__link--active { color: #7b2fff; font-weight: 600; }

        /* ── Main ── */
        .mypage-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .mypage-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .mypage-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        /* ── Empty state ── */
        .mypage-empty {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .mypage-empty i {
            font-size: 64px;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }
        .mypage-empty p {
            font-size: 16px;
            margin-bottom: 8px;
            color: #888;
        }
        .mypage-empty a {
            color: #7b2fff;
            font-weight: 600;
        }

        /* ── Order Card ── */
        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .order-card:hover {
            border-color: rgba(123,47,255,0.3);
        }

        .order-card__top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .order-card__plan {
            font-size: 20px;
            font-weight: 700;
        }
        .order-card__date {
            font-size: 13px;
            color: #666;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-badge--pending {
            background: rgba(255,255,255,0.12);
            color: #ccc;
        }
        .status-badge--quote {
            background: rgba(123,47,255,0.12);
            color: #7b2fff;
        }
        .status-badge--paid {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .status-badge--contract {
            background: rgba(229,60,17,0.12);
            color: #e53c11;
        }
        .status-badge--completed {
            background: #e53c11;
            color: #fff;
            box-shadow: 0 0 12px rgba(229,60,17,0.4);
        }

        /* ── Process Bar ── */
        .process-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .process-bar__step {
            flex: 1;
            min-width: 0;
            text-align: center;
            position: relative;
        }
        .process-bar__dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
            font-size: 12px;
            color: #666;
            transition: all 0.3s;
        }
        .process-bar__dot--active {
            background: #e53c11;
            border-color: #e53c11;
            color: #fff;
            box-shadow: 0 0 12px rgba(229,60,17,0.4);
        }
        .process-bar__dot--done {
            background: #7b2fff;
            border-color: #7b2fff;
            color: #fff;
        }
        .process-bar__label {
            font-size: 11px;
            color: #666;
            white-space: nowrap;
        }
        .process-bar__label--active {
            color: #e53c11;
            font-weight: 600;
        }
        .process-bar__label--done {
            color: #7b2fff;
        }
        .process-bar__line {
            flex: 0 0 20px;
            height: 2px;
            background: #333;
            margin-top: -16px;
        }
        .process-bar__line--done {
            background: #7b2fff;
        }

        /* ── Order Details ── */
        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .order-detail {
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .order-detail__label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .order-detail__value {
            font-size: 14px;
            font-weight: 600;
        }

        .order-addons {
            margin-top: 12px;
        }
        .order-addons__title {
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        .order-addon-tag {
            display: inline-block;
            background: rgba(123,47,255,0.1);
            color: #a78bfa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin: 2px 4px 2px 0;
        }

        .order-memo {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        /* ── Loading ── */
        .mypage-loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .mypage-loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 12px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .mypage-header { padding: 0 16px; }
            .mypage-main { padding: 24px 16px 60px; }
            .mypage-title { font-size: 22px; }
            .order-details { grid-template-columns: 1fr; }
            .process-bar { gap: 2px; }
            .process-bar__dot { width: 24px; height: 24px; font-size: 10px; }
            .process-bar__label { font-size: 10px; }
            .process-bar__line { flex: 0 0 12px; }
        }

        /* ── Order Action Buttons ── */
        .order-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .order-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .order-action-btn--quote {
            background: rgba(123,47,255,0.12);
            color: #a78bfa;
            border: 1px solid rgba(123,47,255,0.2);
        }
        .order-action-btn--quote:hover {
            background: rgba(123,47,255,0.25);
            border-color: rgba(123,47,255,0.4);
        }
        .order-action-btn--contract {
            background: rgba(229,60,17,0.12);
            color: #e53c11;
            border: 1px solid rgba(229,60,17,0.2);
        }
        .order-action-btn--contract:hover {
            background: rgba(229,60,17,0.25);
            border-color: rgba(229,60,17,0.4);
        }
        .order-action-btn--deposit {
            background: linear-gradient(135deg, #7b2fff 0%, #9b6cff 100%);
            color: #fff;
            border: 1px solid rgba(123,47,255,0.5);
            font-weight: 700;
            box-shadow: 0 0 15px rgba(123,47,255,0.5);
            animation: depositGlow 2s infinite alternate;
        }
        .order-action-btn--deposit:hover {
            background: linear-gradient(135deg, #6c23e8 0%, #8a58f4 100%);
            box-shadow: 0 0 20px rgba(123,47,255,0.7);
            transform: translateY(-1px);
        }
        @keyframes depositGlow {
            from { box-shadow: 0 0 10px rgba(123,47,255,0.3); }
            to { box-shadow: 0 0 20px rgba(123,47,255,0.6); }
        }
        .order-action-btn--cancel {
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .order-action-btn--cancel:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* ── Document Modal ── */
        .doc-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .doc-modal-overlay.show {
            display: flex;
        }
        .doc-modal {
            background: #141418;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
            animation: docModalIn 0.25s ease;
        }
        @keyframes docModalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .doc-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .doc-modal__title {
            font-size: 20px;
            font-weight: 700;
        }
        .doc-modal__close {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #888;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .doc-modal__close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        /* PC 환경에서만 닫기 버튼을 모달 우측 상단에 고정 */
        @media (min-width: 768px) {
            .doc-modal__close--pc-fixed {
                display: flex;
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 10001;
                background: rgba(20,20,24,0.95);
                border: 1px solid rgba(255,255,255,0.25);
                box-shadow: 0 4px 16px rgba(0,0,0,0.5);
                width: 40px;
                height: 40px;
                border-radius: 10px;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                color: #aaa;
                cursor: pointer;
                transition: 0.2s;
            }
            .doc-modal__close--pc-fixed:hover {
                background: rgba(255,255,255,0.12);
                color: #fff;
            }
        }
        @media (max-width: 767px) {
            .doc-modal__close--pc-fixed {
                display: none !important;
            }
        }
        .doc-modal__row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .doc-modal__label {
            font-size: 13px;
            color: #888;
        }
        .doc-modal__value {
            font-size: 14px;
            font-weight: 600;
            text-align: right;
        }
        .doc-modal__divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 16px 0;
        }
        .doc-modal__total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-radius: 10px;
            margin-top: 12px;
        }
        .doc-modal__total--quote {
            background: rgba(123,47,255,0.1);
            border: 1px solid rgba(123,47,255,0.2);
        }
        .doc-modal__total--contract {
            background: rgba(229,60,17,0.1);
            border: 1px solid rgba(229,60,17,0.2);
        }
        .doc-modal__total-label {
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
        }
        .doc-modal__total-value {
            font-size: 20px;
            font-weight: 700;
        }
        .doc-modal__total-value--quote { color: #7b2fff; }
        .doc-modal__total-value--contract { color: #e53c11; }
        .doc-modal__stamp {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .doc-modal__stamp--completed {
            background: rgba(229,60,17,0.1);
            border: 1px solid rgba(229,60,17,0.2);
            color: #e53c11;
        }
        .doc-modal__addon-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
        }
        .doc-modal__addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 13px;
        }
        .doc-modal__addon-name { color: #aaa; }
        .doc-modal__addon-price { color: #ccc; font-weight: 500; }

        /* ── Contract Info Modal (사업자 정보 입력) ── */
        .biz-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            z-index: 9100; align-items: center; justify-content: center;
        }
        .biz-modal-overlay.show { display: flex; }
        .biz-modal {
            background: #141418; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; width: 92%; max-width: 520px;
            max-height: 88vh; overflow-y: auto; padding: 28px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            animation: docModalIn 0.25s ease;
        }
        .biz-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; }
        .biz-tab {
            flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600;
            border-radius: 8px; cursor: pointer; color: #888; transition: all 0.2s; border: none; background: transparent;
        }
        .biz-tab.active { background: #7b2fff; color: #fff; }
        .biz-tab-panel { display: none; }
        .biz-tab-panel.active { display: block; }
        .biz-form-group { margin-bottom: 14px; }
        .biz-form-group label { display: block; font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 6px; }
        .biz-form-group input {
            width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04); color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .biz-form-group input:focus { border-color: #7b2fff; }
        .biz-form-group input[readonly] { color: #666; cursor: not-allowed; }
        .biz-dropzone {
            border: 2px dashed rgba(123,47,255,0.3); border-radius: 12px; padding: 30px 20px;
            text-align: center; cursor: pointer; transition: all 0.2s; background: rgba(123,47,255,0.03);
        }
        .biz-dropzone:hover, .biz-dropzone.dragover { border-color: #7b2fff; background: rgba(123,47,255,0.08); }
        .biz-dropzone i { font-size: 36px; color: #7b2fff; display: block; margin-bottom: 8px; }
        .biz-dropzone p { font-size: 13px; color: #aaa; margin: 0; }
        .biz-dropzone small { font-size: 11px; color: #666; }
        .biz-file-preview { margin-top: 12px; padding: 10px; background: rgba(123,47,255,0.06); border: 1px solid rgba(123,47,255,0.15); border-radius: 8px; display: none; align-items: center; gap: 10px; }
        .biz-file-preview img { max-height: 60px; border-radius: 6px; }
        .biz-file-preview span { flex: 1; font-size: 12px; color: #ccc; word-break: break-all; }
        .biz-submit-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px;
            font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 16px;
            background: linear-gradient(135deg, #7b2fff 0%, #e53c11 100%); color: #fff;
        }
        .biz-submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .biz-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .biz-info-note { font-size: 11px; color: #666; line-height: 1.5; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; }

        /* ── Profile Section ── */
        .profile-section {
            margin-bottom: 32px;
        }
        .profile-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .profile-card:hover {
            border-color: rgba(123,47,255,0.25);
        }
        .profile-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .profile-card__header:hover {
            background: rgba(255,255,255,0.02);
        }
        .profile-card__header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .profile-card__avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2fff 0%, #e53c11 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .profile-card__name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }
        .profile-card__email {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .profile-card__toggle {
            font-size: 20px;
            color: #666;
            transition: transform 0.3s;
        }
        .profile-card__toggle.open {
            transform: rotate(180deg);
        }
        .profile-card__body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .profile-card__body.open {
            max-height: 2000px;
        }
        .profile-card__content {
            padding: 0 24px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .profile-grid { grid-template-columns: 1fr; }
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .profile-field--full {
            grid-column: 1 / -1;
        }
        .profile-field__label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .profile-field__value {
            font-size: 14px;
            color: #ddd;
            min-height: 20px;
        }
        .profile-field__value--empty {
            color: #555;
            font-style: italic;
        }
        .profile-field__input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .profile-field__input:focus {
            border-color: #7b2fff;
        }
        .profile-field__input[readonly] {
            color: #666;
            cursor: not-allowed;
            background: rgba(255,255,255,0.02);
        }
        .profile-gender-group {
            display: flex;
            gap: 8px;
        }
        .profile-gender-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #888;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .profile-gender-btn.active {
            border-color: #7b2fff;
            background: rgba(123,47,255,0.2);
            color: #a78bfa;
        }
        .profile-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .profile-btn {
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .profile-btn--edit {
            background: rgba(123,47,255,0.12);
            color: #a78bfa;
            border: 1px solid rgba(123,47,255,0.25);
        }
        .profile-btn--edit:hover {
            background: rgba(123,47,255,0.25);
        }
        .profile-btn--save {
            background: linear-gradient(135deg, #7b2fff, #e53c11);
            color: #fff;
        }
        .profile-btn--save:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .profile-btn--save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .profile-btn--cancel {
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .profile-btn--cancel:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .profile-toast {
            display: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
            text-align: center;
        }
        .profile-toast--success {
            display: block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .profile-toast--error {
            display: block;
            background: rgba(229,60,17,0.1);
            border: 1px solid rgba(229,60,17,0.2);
            color: #e53c11;
        }
        .profile-join-date {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #555;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Account Security Section ── */
        .profile-security {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .profile-security__title {
            font-size: 13px;
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .security-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .security-card__label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 10px;
        }
        .security-card__row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            margin-bottom: 8px;
        }
        .security-card__row .profile-field__input {
            flex: 1;
        }
        .security-card__note {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
            line-height: 1.4;
        }
        .security-btn {
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .security-btn--primary {
            background: rgba(123,47,255,0.15);
            color: #a78bfa;
            border: 1px solid rgba(123,47,255,0.25);
        }
        .security-btn--primary:hover {
            background: rgba(123,47,255,0.3);
        }
        .security-btn--primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .security-toast {
            display: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
        }
        .security-toast--success {
            display: block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .security-toast--error {
            display: block;
            background: rgba(229,60,17,0.1);
            border: 1px solid rgba(229,60,17,0.2);
            color: #e53c11;
        }
        /* Password Tabs */
        .pw-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 14px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .pw-tab {
            flex: 1;
            padding: 9px 0;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: rgba(255,255,255,0.03);
            color: #666;
            transition: all 0.2s;
            text-align: center;
        }
        .pw-tab.active {
            background: rgba(123,47,255,0.15);
            color: #a78bfa;
        }
        .pw-panel { display: none; }
        .pw-panel.active { display: block; }

        /* ── Withdraw Section ── */
        .withdraw-section {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .withdraw-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #666;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .withdraw-btn:hover {
            color: #e53c11;
            border-color: rgba(229,60,17,0.3);
            background: rgba(229,60,17,0.05);
        }
        /* Withdraw Modal */
        .withdraw-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .withdraw-modal-overlay.show {
            display: flex;
        }
        .withdraw-modal {
            background: #1a1a2e;
            border: 1px solid rgba(229,60,17,0.2);
            border-radius: 16px;
            max-width: 440px;
            width: 90%;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .withdraw-modal__icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 12px;
        }
        .withdraw-modal__title {
            font-size: 18px;
            font-weight: 700;
            color: #e53c11;
            text-align: center;
            margin-bottom: 8px;
        }
        .withdraw-modal__desc {
            font-size: 13px;
            color: #999;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .withdraw-modal__warning {
            padding: 12px;
            background: rgba(229,60,17,0.08);
            border: 1px solid rgba(229,60,17,0.15);
            border-radius: 10px;
            font-size: 12px;
            color: #e57373;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .withdraw-modal__confirm-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .withdraw-modal__confirm-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid rgba(229,60,17,0.2);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
            transition: border-color 0.2s;
        }
        .withdraw-modal__confirm-input:focus {
            border-color: #e53c11;
        }
        .withdraw-modal__actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .withdraw-modal__cancel {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }
        .withdraw-modal__submit {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #e53c11;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .withdraw-modal__submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .withdraw-modal__submit:not(:disabled):hover {
            background: #c42f0e;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="mypage-header">
    <a href="/" class="mypage-header__logo">THE PANG</a>
    <nav class="mypage-header__nav">
        <a href="/" class="mypage-header__link">홈</a>
        <a href="/mypage.html" class="mypage-header__link mypage-header__link--active">마이페이지</a>
        <a href="javascript:void(0)" id="logoutBtn" class="mypage-header__link">로그아웃</a>
    </nav>
</header>

<!-- Main -->
<main class="mypage-main">
    <h1 class="mypage-title">마이페이지</h1>
    <p class="mypage-subtitle" id="userGreeting">진행 중인 견적 및 계약 상태를 확인하세요</p>

    <!-- Profile Section -->
    <div class="profile-section" id="profileSection" style="display:none;">
        <div class="profile-card">
            <div class="profile-card__header" id="profileToggle">
                <div class="profile-card__header-left">
                    <div class="profile-card__avatar" id="profileAvatar">?</div>
                    <div>
                        <div class="profile-card__name" id="profileDisplayName">-</div>
                        <div class="profile-card__email" id="profileDisplayEmail">-</div>
                    </div>
                </div>
                <i class="ri-arrow-down-s-line profile-card__toggle" id="profileToggleIcon"></i>
            </div>
            <div class="profile-card__body" id="profileBody">
                <div class="profile-card__content">
                    <!-- View Mode -->
                    <div id="profileViewMode">
                        <div class="profile-grid">
                            <div class="profile-field">
                                <span class="profile-field__label">이름</span>
                                <span class="profile-field__value" id="pv-name">-</span>
                            </div>
                            <div class="profile-field">
                                <span class="profile-field__label">이메일</span>
                                <span class="profile-field__value" id="pv-email">-</span>
                            </div>
                            <div class="profile-field">
                                <span class="profile-field__label">연락처</span>
                                <span class="profile-field__value" id="pv-phone">-</span>
                            </div>
                            <div class="profile-field">
                                <span class="profile-field__label">생년월일</span>
                                <span class="profile-field__value" id="pv-birthday">-</span>
                            </div>
                            <div class="profile-field">
                                <span class="profile-field__label">성별</span>
                                <span class="profile-field__value" id="pv-gender">-</span>
                            </div>
                            <div class="profile-field">
                                <span class="profile-field__label">주소</span>
                                <span class="profile-field__value" id="pv-address">-</span>
                            </div>
                        </div>
                        <div class="profile-join-date" id="pv-joinDate">
                            <i class="ri-calendar-line"></i>
                            <span>가입일: -</span>
                        </div>
                        <div class="profile-actions">
                            <button class="profile-btn profile-btn--edit" onclick="switchProfileMode('edit')">
                                <i class="ri-edit-line"></i> 회원정보 수정
                            </button>
                        </div>
                    </div>
                    <!-- Edit Mode -->
                    <div id="profileEditMode" style="display:none;">
                        <div class="profile-grid">
                            <div class="profile-field">
                                <label class="profile-field__label">이름 <span style="color:#e53c11;">*</span></label>
                                <input type="text" class="profile-field__input" id="pe-name" placeholder="이름">
                            </div>
                            <div class="profile-field">
                                <label class="profile-field__label">이메일</label>
                                <input type="email" class="profile-field__input" id="pe-email" readonly>
                            </div>
                            <div class="profile-field">
                                <label class="profile-field__label">연락처</label>
                                <input type="tel" class="profile-field__input" id="pe-phone" placeholder="010-1234-5678" oninput="window.formatPhone(this)">
                            </div>
                            <div class="profile-field">
                                <label class="profile-field__label">생년월일</label>
                                <input type="date" class="profile-field__input" id="pe-birthday" max="9999-12-31">
                            </div>
                            <div class="profile-field">
                                <label class="profile-field__label">성별</label>
                                <div class="profile-gender-group">
                                    <button type="button" class="profile-gender-btn" data-gender="male" onclick="selectProfileGender('male')">남성</button>
                                    <button type="button" class="profile-gender-btn" data-gender="female" onclick="selectProfileGender('female')">여성</button>
                                </div>
                                <input type="hidden" id="pe-gender">
                            </div>
                            <div class="profile-field">
                                <label class="profile-field__label">주소</label>
                                <input type="text" class="profile-field__input" id="pe-address" placeholder="기본 주소">
                            </div>
                            <div class="profile-field profile-field--full">
                                <label class="profile-field__label">상세 주소</label>
                                <input type="text" class="profile-field__input" id="pe-addressDetail" placeholder="동/호수 등 상세 주소">
                            </div>
                        </div>
                        <div id="profileToast" class="profile-toast"></div>
                        <div class="profile-actions">
                            <button class="profile-btn profile-btn--cancel" onclick="switchProfileMode('view')">
                                취소
                            </button>
                            <button class="profile-btn profile-btn--save" id="profileSaveBtn" onclick="saveProfile()">
                                <i class="ri-save-line"></i> 저장하기
                            </button>
                        </div>

                        <!-- Account Security Section -->
                        <div class="profile-security">
                            <div class="profile-security__title"><i class="ri-shield-keyhole-line"></i> 계정 보안</div>

                            <!-- Password Change -->
                            <div class="security-card">
                                <div class="security-card__label"><i class="ri-lock-password-line"></i> 비밀번호 변경</div>
                                <div style="margin-top:12px;">
                                    <input type="password" class="profile-field__input" id="sp-currentPw" placeholder="현재 비밀번호" style="margin-bottom:8px;">
                                    <input type="password" class="profile-field__input" id="sp-newPw" placeholder="새 비밀번호 (8자 이상)" style="margin-bottom:8px;">
                                    <input type="password" class="profile-field__input" id="sp-confirmPw" placeholder="새 비밀번호 확인" style="margin-bottom:10px;">
                                    <button class="security-btn security-btn--primary" id="pwChangeBtn" onclick="changePassword()" style="width:100%;">
                                        <i class="ri-lock-line"></i> 비밀번호 변경
                                    </button>
                                    <div id="pwChangeToast" class="security-toast"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Withdraw Section -->
                        <div class="withdraw-section">
                            <button class="withdraw-btn" onclick="openWithdrawModal()">
                                <i class="ri-user-unfollow-line"></i> 회원 탈퇴
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Withdraw Confirmation Modal -->
    <div class="withdraw-modal-overlay" id="withdrawModalOverlay">
        <div class="withdraw-modal">
            <div class="withdraw-modal__icon">⚠️</div>
            <div class="withdraw-modal__title">회원 탈퇴</div>
            <div class="withdraw-modal__desc">
                탈퇴 시 회원 정보가 비활성화되며<br>복구가 불가능합니다.
            </div>
            <div class="withdraw-modal__warning" id="withdrawWarning" style="display:none;"></div>
            <div class="withdraw-modal__confirm-label">
                탈퇴를 원하시면 아래에 <strong style="color:#e53c11;">탈퇴합니다</strong>를 입력해 주세요.
            </div>
            <input type="text" class="withdraw-modal__confirm-input" id="withdrawConfirmInput" placeholder="탈퇴합니다" autocomplete="off">
            <div id="withdrawToast" class="security-toast" style="margin-top:10px;"></div>
            <div class="withdraw-modal__actions">
                <button class="withdraw-modal__cancel" onclick="closeWithdrawModal()">취소</button>
                <button class="withdraw-modal__submit" id="withdrawSubmitBtn" disabled onclick="confirmWithdraw()">탈퇴하기</button>
            </div>
        </div>
    </div>

    <div id="orderContainer">
        <div class="mypage-loading">
            <i class="ri-loader-4-line"></i>
            <p>주문 내역을 불러오는 중...</p>
        </div>
    </div>
</main>

<!-- Document Modal -->
<div class="doc-modal-overlay" id="docModalOverlay" onclick="if(event.target===this)closeDocModal()">
    <div class="doc-modal">
        <div class="doc-modal__header">
            <h3 class="doc-modal__title" id="docModalTitle"></h3>
            <button class="doc-modal__close" onclick="closeDocModal()"><i class="ri-close-line"></i></button>
        </div>
        <div id="docModalBody"></div>
    </div>
</div>
<!-- PC 전용 고정 닫기 버튼 -->
<button class="doc-modal__close--pc-fixed" id="docModalClosePc" onclick="closeDocModal()" style="display:none;"><i class="ri-close-line"></i></button>

<!-- Contract Info Modal (사업자 정보 입력) -->
<div class="biz-modal-overlay" id="bizModalOverlay">
    <div class="biz-modal">
        <div class="doc-modal__header">
            <h3 class="doc-modal__title">📋 계약 정보 등록</h3>
            <button class="doc-modal__close" onclick="closeBizModal()"><i class="ri-close-line"></i></button>
        </div>
        <div class="biz-tabs">
            <button class="biz-tab active" onclick="switchBizTab('upload')">📎 간편 첨부 (추천)</button>
            <button class="biz-tab" onclick="switchBizTab('manual')">✏️ 직접 입력</button>
        </div>
        <!-- 탭 1: 간편 첨부 -->
        <div class="biz-tab-panel active" id="bizTabUpload">
            <div class="biz-dropzone" id="bizDropzone">
                <i class="ri-upload-cloud-2-line"></i>
                <p>사업자등록증을 올려주세요</p>
                <small>클릭 또는 드래그 앤 드롭 (JPG, PNG, PDF)</small>
                <input type="file" id="bizFileInput" accept="image/*,.pdf" hidden>
            </div>
            <div class="biz-file-preview" id="bizFilePreview">
                <img id="bizFileThumb" src="" alt="">
                <span id="bizFileName"></span>
                <button onclick="removeBizFile()" style="background:none;border:none;color:#e53c11;cursor:pointer;font-size:18px;"><i class="ri-close-circle-fill"></i></button>
            </div>
            <div class="biz-info-note">💡 등록증만 올려주시면 담당 PD가 계약서를 대신 세팅해 드립니다.</div>
            <div class="biz-form-group" style="margin-top:16px;">
                <label>담당자 성명</label>
                <input type="text" id="bizUploadName" readonly>
            </div>
            <div class="biz-form-group">
                <label>담당자 연락처 <span style="color:#e53c11;">*</span></label>
                <input type="tel" id="bizUploadPhone" placeholder="010-0000-0000" oninput="window.formatPhone(this)">
            </div>
            <div class="biz-form-group">
                <label>담당자 이메일</label>
                <input type="email" id="bizUploadEmail" readonly>
            </div>
            <button class="biz-submit-btn" id="bizUploadSubmitBtn" onclick="submitBizUpload()">제출하기</button>
        </div>
        <!-- 탭 2: 직접 입력 -->
        <div class="biz-tab-panel" id="bizTabManual">
            <div class="biz-form-group">
                <label>업체명 <span style="color:#e53c11;">*</span></label>
                <input type="text" id="bizManualCompany" placeholder="예: 더팡스토어">
            </div>
            <div class="biz-form-group">
                <label>대표자 성명 <span style="color:#e53c11;">*</span></label>
                <input type="text" id="bizManualCeo" placeholder="예: 홍길동">
            </div>
            <div class="biz-form-group">
                <label>사업자등록번호 <span style="color:#e53c11;">*</span></label>
                <input type="text" id="bizManualBizNum" placeholder="예: 123-45-67890" oninput="window.formatBizNum(this)">
            </div>
            <div class="biz-form-group">
                <label>업체 주소 <span style="color:#e53c11;">*</span></label>
                <input type="text" id="bizManualAddress" placeholder="예: 서울시 강남구 테헤란로 123">
            </div>
            <div class="biz-form-group">
                <label>업태 / 종목</label>
                <input type="text" id="bizManualBizType" placeholder="예: 서비스 / 음식점업">
            </div>
            <div class="biz-form-group">
                <label>담당자 성명</label>
                <input type="text" id="bizManualName" readonly>
            </div>
            <div class="biz-form-group">
                <label>담당자 연락처 <span style="color:#e53c11;">*</span></label>
                <input type="tel" id="bizManualPhone" placeholder="010-0000-0000" oninput="window.formatPhone(this)">
            </div>
            <div class="biz-form-group">
                <label>담당자 이메일</label>
                <input type="email" id="bizManualEmail" readonly>
            </div>
            <button class="biz-submit-btn" id="bizManualSubmitBtn" onclick="submitBizManual()">제출하기</button>
        </div>
        <input type="hidden" id="bizOrderId" value="">
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
(async function initMyPage() {
    const container = document.getElementById('orderContainer');
    const greeting = document.getElementById('userGreeting');

    // ── 로그아웃: try 바깥에서 항상 등록 (네트워크 장애/SDK 행 시에도 작동 보장) ──
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        // 1. 고객용 세션 키만 삭제 (관리자 토큰은 보존)
        Object.keys(localStorage).forEach(key => {
            if (key === 'pang-user-auth-token' || key.startsWith('sb-')) {
                localStorage.removeItem(key);
            }
        });
        // 2. Supabase signOut은 비동기로 시도하되 기다리지 않음
        try { PangAuth.signOut().catch(() => {}); } catch(e) {}
        // 3. 즉시 리다이렉트
        window.location.href = '/';
    });

    // ── Supabase 클라이언트 응답 안전장치 (8초 타임아웃) ──
    // 토큰이 손상되어 SDK 전체가 멈추는 현상 방지
    const _supabaseHealthTimer = setTimeout(() => {
        console.warn('[mypage] Supabase 클라이언트 응답 없음 — 토큰 초기화 후 리로드');
        Object.keys(localStorage).forEach(key => {
            if (key === 'pang-user-auth-token' || key.startsWith('sb-')) {
                localStorage.removeItem(key);
            }
        });
        window.location.href = '/?login=required';
    }, 8000);

    try {
        // 인증 확인: getSession()도 타임아웃 적용 (SDK 행 시 무한대기 방지)
        let user = null;
        try {
            const session = await Promise.race([
                PangAuth.getSession(),
                new Promise((_, reject) => setTimeout(() => reject(new Error('session timeout')), 5000))
            ]);
            if (session && session.user) {
                user = session.user;
            } else {
                // 세션 없으면 getUser()로 한번 더 시도 (5초 타임아웃)
                user = await Promise.race([
                    PangAuth.getUser(),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('auth timeout')), 5000))
                ]);
            }
        } catch(e) {
            console.warn('[mypage] auth check failed:', e);
        }

        // 타임아웃 해제 (정상 응답 받음)
        clearTimeout(_supabaseHealthTimer);

        if (!user) {
            window.location.href = '/?login=required';
            return;
        }

        const name = user.user_metadata?.name || user.email?.split('@')[0] || '사용자';
        greeting.textContent = `${name}님, 진행 중인 견적 및 계약 상태를 확인하세요`;

    /* ══════════════════════════════════════════════════
       회원정보 프로필 섹션
       ══════════════════════════════════════════════════ */
    const profileSection = document.getElementById('profileSection');
    const profileBody = document.getElementById('profileBody');
    const profileToggle = document.getElementById('profileToggle');
    const profileToggleIcon = document.getElementById('profileToggleIcon');

    // 프로필 데이터 캐시
    let _profileData = {};
    let _memberRecord = null;

    // 토글 열기/닫기
    profileToggle.addEventListener('click', () => {
        profileBody.classList.toggle('open');
        profileToggleIcon.classList.toggle('open');
    });

    // 프로필 데이터 로드
    async function loadProfile() {
        const meta = user.user_metadata || {};
        const email = user.email || '';
        const userName = meta.name || email.split('@')[0] || '사용자';

        // members 테이블에서 추가 정보 조회
        try {
            const { data: memberData } = await window._supabaseClient
                .from('members')
                .select('*')
                .eq('user_id', user.id)
                .maybeSingle();
            _memberRecord = memberData;
        } catch(e) {
            console.warn('[mypage] members 조회 실패:', e);
        }

        _profileData = {
            name: userName,
            email: email,
            phone: _memberRecord?.phone || meta.phone || '',
            birthday: meta.birthday || '',
            gender: meta.gender || '',
            address: meta.address || '',
            addressDetail: meta.addressDetail || '',
            joinDate: user.created_at || _memberRecord?.created_at || ''
        };

        // 아바타
        document.getElementById('profileAvatar').textContent = (userName.charAt(0) || '?').toUpperCase();
        document.getElementById('profileDisplayName').textContent = userName;
        document.getElementById('profileDisplayEmail').textContent = email;

        // View 모드 값 세팅
        renderProfileView();

        profileSection.style.display = 'block';
    }

    function renderProfileView() {
        const setField = (id, val, emptyText) => {
            const el = document.getElementById(id);
            if (val && val.trim()) {
                el.textContent = val;
                el.classList.remove('profile-field__value--empty');
            } else {
                el.textContent = emptyText || '미입력';
                el.classList.add('profile-field__value--empty');
            }
        };

        setField('pv-name', _profileData.name);
        setField('pv-email', _profileData.email);
        setField('pv-phone', _profileData.phone, '미입력');

        // 생년월일 포맷
        if (_profileData.birthday) {
            try {
                const d = new Date(_profileData.birthday);
                setField('pv-birthday', d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }));
            } catch {
                setField('pv-birthday', _profileData.birthday);
            }
        } else {
            setField('pv-birthday', '', '미입력');
        }

        // 성별
        const genderMap = { male: '남성', female: '여성' };
        setField('pv-gender', genderMap[_profileData.gender] || '', '미입력');

        // 주소
        const fullAddr = [_profileData.address, _profileData.addressDetail].filter(Boolean).join(' ');
        setField('pv-address', fullAddr, '미입력');

        // 가입일
        const joinEl = document.getElementById('pv-joinDate');
        if (_profileData.joinDate) {
            try {
                const jd = new Date(_profileData.joinDate);
                joinEl.querySelector('span').textContent = '가입일: ' + jd.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                joinEl.querySelector('span').textContent = '가입일: -';
            }
        }
    }

    // 모드 전환
    window.switchProfileMode = function(mode) {
        const viewEl = document.getElementById('profileViewMode');
        const editEl = document.getElementById('profileEditMode');
        const toastEl = document.getElementById('profileToast');
        toastEl.className = 'profile-toast';
        toastEl.textContent = '';

        if (mode === 'edit') {
            viewEl.style.display = 'none';
            editEl.style.display = 'block';
            // 기존 값 채우기
            document.getElementById('pe-name').value = _profileData.name || '';
            document.getElementById('pe-email').value = _profileData.email || '';
            document.getElementById('pe-phone').value = _profileData.phone || '';
            document.getElementById('pe-birthday').value = _profileData.birthday || '';
            document.getElementById('pe-gender').value = _profileData.gender || '';
            document.getElementById('pe-address').value = _profileData.address || '';
            document.getElementById('pe-addressDetail').value = _profileData.addressDetail || '';
            // 성별 버튼 활성화
            selectProfileGender(_profileData.gender || '');
        } else {
            viewEl.style.display = 'block';
            editEl.style.display = 'none';
        }
    };

    // 성별 선택
    window.selectProfileGender = function(gender) {
        document.getElementById('pe-gender').value = gender;
        document.querySelectorAll('.profile-gender-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.gender === gender);
        });
    };

    // 프로필 저장
    window.saveProfile = async function() {
        const toastEl = document.getElementById('profileToast');
        const saveBtn = document.getElementById('profileSaveBtn');
        const newName = document.getElementById('pe-name').value.trim();
        const newPhone = document.getElementById('pe-phone').value.trim();
        const newBirthday = document.getElementById('pe-birthday').value;
        const newGender = document.getElementById('pe-gender').value;
        const newAddress = document.getElementById('pe-address').value.trim();
        const newAddressDetail = document.getElementById('pe-addressDetail').value.trim();

        if (!newName) {
            toastEl.className = 'profile-toast profile-toast--error';
            toastEl.textContent = '이름을 입력해 주세요.';
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin .6s linear infinite;display:inline-block;"></i> 저장 중...';
        toastEl.className = 'profile-toast';

        try {

            // 1. Supabase Auth user_metadata 업데이트
            const { error: authErr } = await window._supabaseClient.auth.updateUser({
                data: {
                    name: newName,
                    phone: newPhone,
                    birthday: newBirthday,
                    gender: newGender,
                    address: newAddress,
                    addressDetail: newAddressDetail
                }
            });
            if (authErr) throw authErr;

            // 2. members 테이블 업데이트
            const { data: updateData, error: memberErr } = await window._supabaseClient
                .from('members')
                .update({ name: newName, phone: newPhone })
                .eq('user_id', user.id)
                .select();
            if (memberErr) console.warn('[mypage] members 업데이트 실패:', memberErr.message);
            if (!updateData || updateData.length === 0) console.warn('[mypage] members 업데이트 0건: 권한이 없거나 정보가 없습니다.');

            // 3. 로컬 캐시 갱신
            _profileData.name = newName;
            _profileData.phone = newPhone;
            _profileData.birthday = newBirthday;
            _profileData.gender = newGender;
            _profileData.address = newAddress;
            _profileData.addressDetail = newAddressDetail;

            // UI 갱신
            document.getElementById('profileAvatar').textContent = (newName.charAt(0) || '?').toUpperCase();
            document.getElementById('profileDisplayName').textContent = newName;
            greeting.textContent = `${newName}님, 진행 중인 견적 및 계약 상태를 확인하세요`;
            renderProfileView();

            toastEl.className = 'profile-toast profile-toast--success';
            toastEl.textContent = '✅ 회원정보가 저장되었습니다.';

            setTimeout(() => {
                switchProfileMode('view');
            }, 1200);

        } catch (err) {
            console.error('[mypage] 프로필 저장 실패:', err);
            toastEl.className = 'profile-toast profile-toast--error';
            toastEl.textContent = '❌ 저장 실패: ' + (err.message || '알 수 없는 오류');
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="ri-save-line"></i> 저장하기';
        }
    };

    /* ══════════════════════════════════════════════════
       계정 보안 — 비밀번호 변경
       ══════════════════════════════════════════════════ */

    // 경로 A: 기존 비밀번호로 직접 변경
    window.changePassword = async function() {
        const toast = document.getElementById('pwChangeToast');
        const btn = document.getElementById('pwChangeBtn');
        const currentPw = document.getElementById('sp-currentPw').value;
        const newPw = document.getElementById('sp-newPw').value;
        const confirmPw = document.getElementById('sp-confirmPw').value;

        if (!currentPw) { toast.className='security-toast security-toast--error'; toast.textContent='현재 비밀번호를 입력해 주세요.'; return; }
        if (!newPw || newPw.length < 8) { toast.className='security-toast security-toast--error'; toast.textContent='새 비밀번호는 8자 이상 입력해 주세요.'; return; }
        if (newPw !== confirmPw) { toast.className='security-toast security-toast--error'; toast.textContent='새 비밀번호가 일치하지 않습니다.'; return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin .6s linear infinite;display:inline-block;"></i> 확인 중...';
        toast.className = 'security-toast';

        try {
            // 1. 현재 비밀번호로 재인증
            const { error: signInErr } = await window._supabaseClient.auth.signInWithPassword({
                email: _profileData.email,
                password: currentPw
            });
            if (signInErr) throw new Error('현재 비밀번호가 올바르지 않습니다.');

            // 2. 새 비밀번호로 변경
            const { error: updateErr } = await window._supabaseClient.auth.updateUser({ password: newPw });
            if (updateErr) throw updateErr;

            toast.className = 'security-toast security-toast--success';
            toast.textContent = '✅ 비밀번호가 변경되었습니다.';
            document.getElementById('sp-currentPw').value = '';
            document.getElementById('sp-newPw').value = '';
            document.getElementById('sp-confirmPw').value = '';
        } catch (err) {
            const raw = err.message || '';
            let msg = err.message;
            // 이미 한글 메시지인 경우 그대로 사용 (예: '현재 비밀번호가 올바르지 않습니다.')
            if (!/[가-힣]/.test(raw)) {
                msg = '비밀번호 변경에 실패했습니다. 잠시 후 다시 시도해 주세요.';
                if (raw.includes('should be different')) {
                    msg = '새 비밀번호는 기존 비밀번호와 달라야 합니다.';
                } else if (raw.includes('weak') || raw.includes('password')) {
                    msg = '비밀번호가 너무 약합니다. 영문자, 숫자, 특수문자를 조합해주세요.';
                } else if (raw.includes('rate limit')) {
                    msg = '요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.';
                } else if (raw.includes('invalid') || raw.includes('credentials')) {
                    msg = '현재 비밀번호가 올바르지 않습니다.';
                }
            }
            toast.className = 'security-toast security-toast--error';
            toast.textContent = '❌ ' + msg;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="ri-lock-line"></i> 비밀번호 변경';
        }
    };



    /* ══════════════════════════════════════════════════
       회원 탈퇴
       ══════════════════════════════════════════════════ */
    const withdrawInput = document.getElementById('withdrawConfirmInput');
    const withdrawSubmitBtn = document.getElementById('withdrawSubmitBtn');

    // 입력 감시 → "탈퇴합니다" 일치 시 버튼 활성화
    withdrawInput.addEventListener('input', () => {
        withdrawSubmitBtn.disabled = withdrawInput.value.trim() !== '탈퇴합니다';
    });

    window.openWithdrawModal = async function() {
        const overlay = document.getElementById('withdrawModalOverlay');
        const warningEl = document.getElementById('withdrawWarning');
        withdrawInput.value = '';
        withdrawSubmitBtn.disabled = true;
        document.getElementById('withdrawToast').className = 'security-toast';

        // 진행 중 계약건 체크
        try {
            const orders = await PangOrders.getMyOrders();
            const activeOrders = (orders || []).filter(o => !['completed','cancelled'].includes(o.status));
            if (activeOrders.length > 0) {
                warningEl.innerHTML = `⚠️ 현재 진행 중인 견적/계약 건이 <strong>${activeOrders.length}건</strong> 있습니다.<br>탈퇴 시 진행 중인 건에 대한 서비스가 중단될 수 있습니다.`;
                warningEl.style.display = 'block';
            } else {
                warningEl.style.display = 'none';
            }
        } catch(e) {
            warningEl.style.display = 'none';
        }

        overlay.classList.add('show');
    };

    window.closeWithdrawModal = function() {
        document.getElementById('withdrawModalOverlay').classList.remove('show');
    };

    window.confirmWithdraw = async function() {
        if (withdrawInput.value.trim() !== '탈퇴합니다') return;

        const toast = document.getElementById('withdrawToast');
        withdrawSubmitBtn.disabled = true;
        withdrawSubmitBtn.textContent = '처리 중...';
        toast.className = 'security-toast';

        try {

            let updateData = [];
            // 1. members 테이블 소프트 딜리트
            let { data: firstUpdateData, error: memberErr } = await window._supabaseClient
                .from('members')
                .update({ status: 'withdrawn', withdrawn_at: new Date().toISOString() })
                .eq('user_id', user.id)
                .select();
            
            updateData = firstUpdateData;
            
            // withdrawn_at 컬럼이 없을 경우를 대비한 폴백
            if (memberErr && memberErr.message && memberErr.message.includes('withdrawn_at')) {
                const { data: fallbackData, error: fallbackErr } = await window._supabaseClient
                    .from('members')
                    .update({ status: 'withdrawn' })
                    .eq('user_id', user.id)
                    .select();
                memberErr = fallbackErr;
                updateData = fallbackData;
            }
            if (memberErr) throw memberErr;
            if (!updateData || updateData.length === 0) {
                throw new Error("데이터베이스 업데이트 권한이 없습니다. (Supabase RLS 설정 확인 필요)");
            }

            // 2. 로그아웃
            try { await PangAuth.signOut(); } catch(e) { /* ignore */ }

            // 3. 홈으로 리다이렉트
            window.location.href = '/?withdrawn=1';

        } catch (err) {
            console.error('[mypage] 회원탈퇴 실패:', err);
            toast.className = 'security-toast security-toast--error';
            toast.textContent = '❌ 탈퇴 처리 실패: ' + (err.message || '알 수 없는 오류');
            withdrawSubmitBtn.disabled = false;
            withdrawSubmitBtn.textContent = '탈퇴하기';
        }
    };

    // 프로필 로드 실행
    loadProfile();

    // 주문 목록 로드 (user 객체를 직접 사용하여 불필요한 getUser() 네트워크 호출 방지)
    try {
        // getMyOrders 내부의 getUser() 호출 대신 이미 확인된 user.id를 직접 사용
        const { data: orders, error: ordersErr } = await Promise.race([
            window._supabaseClient
                .from('orders')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false }),
            new Promise((_, reject) => setTimeout(() => reject(new Error('주문 조회 시간 초과')), 10000))
        ]);

        if (ordersErr) throw ordersErr;

        if (!orders || orders.length === 0) {
            container.innerHTML = `
                <div class="mypage-empty">
                    <i class="ri-shopping-cart-line"></i>
                    <p>아직 견적 요청 내역이 없습니다</p>
                    <p><a href="/#pricing">요금 안내 페이지에서 패키지를 선택해 보세요 →</a></p>
                </div>
            `;
            return;
        }

        container.innerHTML = orders.map(order => renderOrderCard(order)).join('');
    } catch (err) {
        console.error('주문 목록 로드 실패:', err);
        container.innerHTML = `
            <div class="mypage-empty">
                <i class="ri-error-warning-line"></i>
                <p>주문 내역을 불러오는데 실패했습니다</p>
                <p style="font-size:13px; color:#666;">${err.message || ''}</p>
            </div>
        `;
    }

    /* ── 가격 파싱 헬퍼 (파이프 구분: 원가|할인사유|할인가) ── */
    function formatPrice(priceStr) {
        if (!priceStr) return '-';
        if (priceStr.includes('|')) {
            const parts = priceStr.split('|');
            const base = parts[0] || '';
            const reason = parts[1] || '';
            const discounted = parts[2] || '';
            if (discounted) {
                return `<span style="text-decoration:line-through; color:#666; font-size:12px;">${base}원</span> <span style="color:#7b2fff; font-size:11px;">${reason}</span> <strong style="color:#e53c11;">${discounted}원</strong>`;
            }
            return `${base}원`;
        }
        return `${priceStr}원`;
    }

    /* ── 숫자 추출 헬퍼 (쉼표 제거 후 첫 숫자 추출) ── */
    function extractNumber(str) {
        if (!str) return 0;
        const cleaned = str.replace(/,/g, '');
        const match = cleaned.match(/(\d+)/);
        return match ? parseInt(match[1], 10) : 0;
    }

    /* ── 기본가 + 추가옵션 합계 계산 ── */
    function calcEstimatedTotal(order) {
        // 기본 가격: 할인가가 있으면 할인가, 없으면 원가
        let baseAmount = 0;
        if (order.plan_price) {
            if (order.plan_price.includes('|')) {
                const parts = order.plan_price.split('|');
                const discounted = parts[2] || '';
                baseAmount = discounted ? extractNumber(discounted) : extractNumber(parts[0]);
            } else {
                baseAmount = extractNumber(order.plan_price);
            }
        }
        // 추가 옵션 합계
        let addonsTotal = 0;
        if (order.addons && Array.isArray(order.addons)) {
            order.addons.forEach(a => {
                addonsTotal += extractNumber(a.price || '');
            });
        }
        return baseAmount + addonsTotal;
    }

    function renderOrderCard(order) {
        const STATUS_MAP = {
            'quote_pending':    { label: '견적 대기', badge: 'pending',   icon: '⏳', step: 1 },
            'quote_issued':     { label: '견적서 발행', badge: 'quote',   icon: '📋', step: 2 },
            'paid':             { label: '결제 완료', badge: 'paid',      icon: '💰', step: 3 },
            'contract_issued':  { label: '계약서 발행', badge: 'contract', icon: '📄', step: 4 },
            'completed':        { label: '계약 체결 완료', badge: 'completed', icon: '🎉', step: 5 }
        };

        const s = STATUS_MAP[order.status] || STATUS_MAP['quote_pending'];
        const steps = [
            { label: '견적담기', step: 1 },
            { label: '견적서', step: 2 },
            { label: '결제확인', step: 3 },
            { label: '계약서', step: 4 },
            { label: '체결완료', step: 5 }
        ];

        const processBarHtml = steps.map((st, i) => {
            const isDone = s.step > st.step;
            const isActive = s.step === st.step;
            const dotClass = isDone ? 'process-bar__dot--done' : (isActive ? 'process-bar__dot--active' : '');
            const labelClass = isDone ? 'process-bar__label--done' : (isActive ? 'process-bar__label--active' : '');
            const icon = isDone ? '✓' : (i + 1);

            let html = `
                <div class="process-bar__step">
                    <div class="process-bar__dot ${dotClass}">${icon}</div>
                    <div class="process-bar__label ${labelClass}">${st.label}</div>
                </div>
            `;
            if (i < steps.length - 1) {
                const lineClass = s.step > st.step ? 'process-bar__line--done' : '';
                html += `<div class="process-bar__line ${lineClass}"></div>`;
            }
            return html;
        }).join('');

        // 추가 옵션
        let addonsHtml = '';
        if (order.addons && Array.isArray(order.addons) && order.addons.length > 0) {
            addonsHtml = `
                <div class="order-addons">
                    <div class="order-addons__title">추가 옵션</div>
                    ${order.addons.map(a => `<span class="order-addon-tag">${a.name} ${a.price || ''}</span>`).join('')}
                </div>
            `;
        }

        // 메모 + 관리자 답변
        let memoHtml = '';
        if (order.memo) {
            memoHtml = `<div class="order-memo">💬 요청사항: ${order.memo}</div>`;
        }
        const adminReply = order.quote_data?.admin_reply || '';
        if (adminReply) {
            memoHtml += `<div class="order-memo" style="background:rgba(123,47,255,0.06); border:1px solid rgba(123,47,255,0.15); margin-top:8px;">📝 답변: ${adminReply}</div>`;
        }

        const createdDate = new Date(order.created_at).toLocaleDateString('ko-KR', {
            year: 'numeric', month: 'long', day: 'numeric'
        });

        return `
            <div class="order-card">
                <div class="order-card__top">
                    <div>
                        <div class="order-card__plan">${order.plan_name}</div>
                        <div class="order-card__date">${createdDate}</div>
                    </div>
                    <span class="status-badge status-badge--${s.badge}">
                        ${s.icon} ${s.label}
                    </span>
                </div>

                <div class="process-bar">
                    ${processBarHtml}
                </div>

                <div class="order-details">
                    <div class="order-detail">
                        <div class="order-detail__label">플랜</div>
                        <div class="order-detail__value">${order.plan_name} (${order.plan_tier || ''})</div>
                    </div>
                    <div class="order-detail">
                        <div class="order-detail__label">기본 가격</div>
                        <div class="order-detail__value">${formatPrice(order.plan_price)}</div>
                    </div>
                    ${order.total_amount ? `
                    <div class="order-detail">
                        <div class="order-detail__label">확정 금액</div>
                        <div class="order-detail__value" style="color:#e53c11">${order.total_amount}원</div>
                    </div>
                    ` : ''}
                </div>

                ${addonsHtml}

                ${(() => {
                    const est = calcEstimatedTotal(order);
                    return est > 0 ? `
                    <div style="margin-top:14px; padding:12px 16px; background:rgba(123,47,255,0.06); border:1px solid rgba(123,47,255,0.15); border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:13px; color:#a78bfa;">예상 합계 (기본가 + 추가옵션)</span>
                        <strong style="font-size:16px; color:#7b2fff;">${est.toLocaleString('ko-KR')}원</strong>
                    </div>` : '';
                })()}

                ${memoHtml}

                ${renderOrderActions(order)}
            </div>
        `;
    }

    /* ── 상태별 액션 버튼 렌더링 ── */
    function renderOrderActions(order) {
        const s = order.status;
        let buttons = '';
        const oj = JSON.stringify(order).replace(/'/g, "&#39;");

        // 견적 대기 상태: 취소 버튼
        if (s === 'quote_pending') {
            buttons += `<button class="order-action-btn order-action-btn--cancel" onclick="cancelMyOrder(${order.id})"><i class="ri-close-circle-line"></i> 견적 요청 취소</button>`;
        }

        // 견적서 보기 → 견적서 PDF → 계약서 보기 → 계약서 PDF 순서
        const quoteReady = ['quote_issued', 'paid', 'contract_issued', 'completed'].includes(s);
        const contractReady = ['contract_issued', 'completed'].includes(s);

        // 견적서 보기
        buttons += `<button class="order-action-btn order-action-btn--quote" onclick='showQuoteDoc(${oj})' ${quoteReady ? '' : 'disabled style="opacity:0.4; cursor:not-allowed;"'}><i class="ri-file-list-3-line"></i> 견적서 보기</button>`;
        // 견적서 PDF
        buttons += `<button class="order-action-btn order-action-btn--quote" onclick='downloadQuotePDF(${oj})' ${quoteReady ? '' : 'disabled style="opacity:0.4; cursor:not-allowed;"'}><i class="ri-download-2-line"></i> 견적서 PDF</button>`;
        // 계약서 보기
        buttons += `<button class="order-action-btn order-action-btn--contract" onclick='showContractDoc(${oj})' ${contractReady ? '' : 'disabled style="opacity:0.4; cursor:not-allowed;"'}><i class="ri-file-paper-2-line"></i> 계약서 보기</button>`;
        // 계약서 PDF (서명 완료 전까지 비활성화)
        const hasSigned = !!(order.contract_data?.customer_signature);
        const contractPdfEnabled = contractReady && hasSigned;
        if (contractPdfEnabled) {
            buttons += `<button class="order-action-btn order-action-btn--contract" onclick='downloadContractPDF(${oj})'><i class="ri-download-2-line"></i> 계약서 PDF</button>`;
        } else {
            // disabled 버튼은 onclick이 불가하므로 wrapper span에서 클릭 처리
            buttons += `<span onclick="${contractReady ? "alert('📝 계약서 보기에서 서명을 먼저 완료해주세요.')" : ''}" title="${contractReady && !hasSigned ? '📝 계약서 보기에서 서명을 먼저 완료해주세요.' : ''}" style="display:inline-block; cursor:${contractReady ? 'pointer' : 'not-allowed'};"><button class="order-action-btn order-action-btn--contract" disabled style="opacity:0.4; cursor:not-allowed; pointer-events:none;"><i class="ri-download-2-line"></i> 계약서 PDF</button></span>`;
        }

        // 계약금 입금 완료 버튼 (견적서 발행 상태에서 표시)
        if (s === 'quote_issued') {
            const hasBizInfo = order.contract_data?.customer_business || order.contract_data?.biz_license_url || order.contract_data?.contact_phone;
            if (!hasBizInfo) {
                buttons += `<button class="order-action-btn order-action-btn--deposit" onclick="openBizModal(${order.id})"><i class="ri-money-dollar-circle-line"></i> 계약금 입금 완료</button>`;
            } else {
                buttons += `<div style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.2);border-radius:10px;font-size:12px;color:#a78bfa;font-weight:600;">✅ 계약 정보 등록 완료</div>`;
            }
        }

        // contract_issued 상태에서도 사업자 정보 등록 여부 표시
        if (s === 'contract_issued') {
            const hasBizInfo = order.contract_data?.customer_business || order.contract_data?.biz_license_url || order.contract_data?.contact_phone;
            if (hasBizInfo) {
                buttons += `<div style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.2);border-radius:10px;font-size:12px;color:#a78bfa;font-weight:600;">✅ 계약 정보 등록 완료</div>`;
            }
        }

        return `<div class="order-actions">${buttons}</div>`;
    }

    window.cancelMyOrder = async function(orderId) {
        if (!confirm('견적 요청을 취소하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
        try {
            await PangOrders.cancelOrder(orderId);
            alert('견적 요청이 취소되었습니다.');
            window.location.reload();

            <!-- 전자서명 영역 -->
            <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:16px;">

                    </div>
                </div>
                ` : ''}
                <div style="background:#fff; border-radius:8px; padding:4px; margin-bottom:8px;">
                    <canvas id="signatureCanvas" width="460" height="120" style="width:100%; height:120px; cursor:crosshair; display:block; border-radius:6px;"></canvas>
                </div>
                <div style="display:flex; gap:8px;">
                    <button onclick="clearSignature()" style="flex:1; height:36px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#ccc; border-radius:8px; font-size:12px; cursor:pointer;">🔄 다시 서명</button>
                    <button onclick="saveSignature(${order.id})" style="flex:1; height:36px; border:none; background:#7b2fff; color:#fff; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;">💾 서명 저장</button>

        `;
