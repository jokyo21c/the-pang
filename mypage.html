<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | THE PANG</title>
    <meta name="description" content="THE PANG 마이페이지 — 견적 진행 현황, 견적서/계약서 확인">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Pretendard Variable', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }

        /* ── Header ── */
        .mypage-header {
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(123,47,255,0.3);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .mypage-header__logo {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #7b2fff;
        }
        .mypage-header__nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .mypage-header__link {
            font-size: 14px;
            color: #888;
            transition: color 0.2s;
        }
        .mypage-header__link:hover { color: #fff; }
        .mypage-header__link--active { color: #7b2fff; font-weight: 600; }

        /* ── Main ── */
        .mypage-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .mypage-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .mypage-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        /* ── Empty state ── */
        .mypage-empty {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .mypage-empty i {
            font-size: 64px;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }
        .mypage-empty p {
            font-size: 16px;
            margin-bottom: 8px;
            color: #888;
        }
        .mypage-empty a {
            color: #7b2fff;
            font-weight: 600;
        }

        /* ── Order Card ── */
        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .order-card:hover {
            border-color: rgba(123,47,255,0.3);
        }

        .order-card__top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .order-card__plan {
            font-size: 20px;
            font-weight: 700;
        }
        .order-card__date {
            font-size: 13px;
            color: #666;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-badge--pending {
            background: rgba(255,193,7,0.12);
            color: #ffc107;
        }
        .status-badge--quote {
            background: rgba(123,47,255,0.12);
            color: #7b2fff;
        }
        .status-badge--paid {
            background: rgba(34,197,94,0.12);
            color: #22c55e;
        }
        .status-badge--contract {
            background: rgba(59,130,246,0.12);
            color: #3b82f6;
        }
        .status-badge--completed {
            background: rgba(34,197,94,0.15);
            color: #22c55e;
            box-shadow: 0 0 12px rgba(34,197,94,0.2);
        }

        /* ── Process Bar ── */
        .process-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .process-bar__step {
            flex: 1;
            min-width: 0;
            text-align: center;
            position: relative;
        }
        .process-bar__dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
            font-size: 12px;
            color: #666;
            transition: all 0.3s;
        }
        .process-bar__dot--active {
            background: #7b2fff;
            border-color: #7b2fff;
            color: #fff;
            box-shadow: 0 0 12px rgba(123,47,255,0.4);
        }
        .process-bar__dot--done {
            background: #22c55e;
            border-color: #22c55e;
            color: #fff;
        }
        .process-bar__label {
            font-size: 11px;
            color: #666;
            white-space: nowrap;
        }
        .process-bar__label--active {
            color: #7b2fff;
            font-weight: 600;
        }
        .process-bar__label--done {
            color: #22c55e;
        }
        .process-bar__line {
            flex: 0 0 20px;
            height: 2px;
            background: #333;
            margin-top: -16px;
        }
        .process-bar__line--done {
            background: #22c55e;
        }

        /* ── Order Details ── */
        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .order-detail {
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .order-detail__label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .order-detail__value {
            font-size: 14px;
            font-weight: 600;
        }

        .order-addons {
            margin-top: 12px;
        }
        .order-addons__title {
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        .order-addon-tag {
            display: inline-block;
            background: rgba(123,47,255,0.1);
            color: #a78bfa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin: 2px 4px 2px 0;
        }

        .order-memo {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        /* ── Loading ── */
        .mypage-loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .mypage-loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 12px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .mypage-header { padding: 0 16px; }
            .mypage-main { padding: 24px 16px 60px; }
            .mypage-title { font-size: 22px; }
            .order-details { grid-template-columns: 1fr; }
            .process-bar { gap: 2px; }
            .process-bar__dot { width: 24px; height: 24px; font-size: 10px; }
            .process-bar__label { font-size: 10px; }
            .process-bar__line { flex: 0 0 12px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="mypage-header">
    <a href="/" class="mypage-header__logo">THE PANG</a>
    <nav class="mypage-header__nav">
        <a href="/" class="mypage-header__link">홈</a>
        <a href="/mypage.html" class="mypage-header__link mypage-header__link--active">마이페이지</a>
        <a href="javascript:void(0)" id="logoutBtn" class="mypage-header__link">로그아웃</a>
    </nav>
</header>

<!-- Main -->
<main class="mypage-main">
    <h1 class="mypage-title">마이페이지</h1>
    <p class="mypage-subtitle" id="userGreeting">진행 중인 견적 및 계약 상태를 확인하세요</p>

    <div id="orderContainer">
        <div class="mypage-loading">
            <i class="ri-loader-4-line"></i>
            <p>주문 내역을 불러오는 중...</p>
        </div>
    </div>
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
(async function initMyPage() {
    const container = document.getElementById('orderContainer');
    const greeting = document.getElementById('userGreeting');

    // 인증 확인
    const user = await PangAuth.getUser();
    if (!user) {
        window.location.href = '/?login=required';
        return;
    }

    const name = user.user_metadata?.name || user.email?.split('@')[0] || '사용자';
    greeting.textContent = `${name}님, 진행 중인 견적 및 계약 상태를 확인하세요`;

    // 로그아웃
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await PangAuth.signOut();
        window.location.href = '/';
    });

    // 주문 목록 로드
    try {
        const orders = await PangOrders.getMyOrders();

        if (!orders || orders.length === 0) {
            container.innerHTML = `
                <div class="mypage-empty">
                    <i class="ri-shopping-cart-line"></i>
                    <p>아직 견적 요청 내역이 없습니다</p>
                    <p><a href="/#pricing">요금 안내 페이지에서 패키지를 선택해 보세요 →</a></p>
                </div>
            `;
            return;
        }

        container.innerHTML = orders.map(order => renderOrderCard(order)).join('');
    } catch (err) {
        console.error('주문 목록 로드 실패:', err);
        container.innerHTML = `
            <div class="mypage-empty">
                <i class="ri-error-warning-line"></i>
                <p>주문 내역을 불러오는데 실패했습니다</p>
                <p style="font-size:13px; color:#666;">${err.message || ''}</p>
            </div>
        `;
    }

    function renderOrderCard(order) {
        const STATUS_MAP = {
            'quote_pending':    { label: '견적 대기', badge: 'pending',   icon: '⏳', step: 1 },
            'quote_issued':     { label: '견적서 발행', badge: 'quote',   icon: '📋', step: 2 },
            'paid':             { label: '결제 완료', badge: 'paid',      icon: '💰', step: 3 },
            'contract_issued':  { label: '계약서 발행', badge: 'contract', icon: '📄', step: 4 },
            'completed':        { label: '계약 체결 완료', badge: 'completed', icon: '🎉', step: 5 }
        };

        const s = STATUS_MAP[order.status] || STATUS_MAP['quote_pending'];
        const steps = [
            { label: '견적담기', step: 1 },
            { label: '견적서', step: 2 },
            { label: '결제확인', step: 3 },
            { label: '계약서', step: 4 },
            { label: '체결완료', step: 5 }
        ];

        const processBarHtml = steps.map((st, i) => {
            const isDone = s.step > st.step;
            const isActive = s.step === st.step;
            const dotClass = isDone ? 'process-bar__dot--done' : (isActive ? 'process-bar__dot--active' : '');
            const labelClass = isDone ? 'process-bar__label--done' : (isActive ? 'process-bar__label--active' : '');
            const icon = isDone ? '✓' : (i + 1);

            let html = `
                <div class="process-bar__step">
                    <div class="process-bar__dot ${dotClass}">${icon}</div>
                    <div class="process-bar__label ${labelClass}">${st.label}</div>
                </div>
            `;
            if (i < steps.length - 1) {
                const lineClass = s.step > st.step ? 'process-bar__line--done' : '';
                html += `<div class="process-bar__line ${lineClass}"></div>`;
            }
            return html;
        }).join('');

        // 추가 옵션
        let addonsHtml = '';
        if (order.addons && Array.isArray(order.addons) && order.addons.length > 0) {
            addonsHtml = `
                <div class="order-addons">
                    <div class="order-addons__title">추가 옵션</div>
                    ${order.addons.map(a => `<span class="order-addon-tag">${a.name} ${a.price || ''}</span>`).join('')}
                </div>
            `;
        }

        // 메모
        let memoHtml = '';
        if (order.memo) {
            memoHtml = `<div class="order-memo">💬 ${order.memo}</div>`;
        }

        const createdDate = new Date(order.created_at).toLocaleDateString('ko-KR', {
            year: 'numeric', month: 'long', day: 'numeric'
        });

        return `
            <div class="order-card">
                <div class="order-card__top">
                    <div>
                        <div class="order-card__plan">${order.plan_name}</div>
                        <div class="order-card__date">${createdDate}</div>
                    </div>
                    <span class="status-badge status-badge--${s.badge}">
                        ${s.icon} ${s.label}
                    </span>
                </div>

                <div class="process-bar">
                    ${processBarHtml}
                </div>

                <div class="order-details">
                    <div class="order-detail">
                        <div class="order-detail__label">플랜</div>
                        <div class="order-detail__value">${order.plan_name} (${order.plan_tier || ''})</div>
                    </div>
                    <div class="order-detail">
                        <div class="order-detail__label">기본 가격</div>
                        <div class="order-detail__value">${order.plan_price || '-'}원</div>
                    </div>
                    ${order.total_amount ? `
                    <div class="order-detail">
                        <div class="order-detail__label">확정 금액</div>
                        <div class="order-detail__value" style="color:#22c55e">${order.total_amount}원</div>
                    </div>
                    ` : ''}
                </div>

                ${addonsHtml}
                ${memoHtml}
            </div>
        `;
    }
})();
</script>
</body>
</html>
