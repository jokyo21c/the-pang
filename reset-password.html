<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PANG — 비밀번호 재설정</title>
    <meta name="description" content="THE PANG 비밀번호 재설정 페이지">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }
        .reset-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .reset-logo__mark {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2fff, #e53c11);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .reset-logo__text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #7b2fff, #e53c11);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reset-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
        }
        .reset-desc {
            font-size: 13px;
            color: #888;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .reset-field {
            margin-bottom: 14px;
        }
        .reset-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
        }
        .reset-field input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .reset-field input:focus {
            border-color: #7b2fff;
        }
        .reset-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #7b2fff, #e53c11);
            color: #fff;
            margin-top: 8px;
        }
        .reset-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .reset-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .reset-toast {
            display: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 16px;
            text-align: center;
        }
        .reset-toast--success {
            display: block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .reset-toast--error {
            display: block;
            background: rgba(229,60,17,0.1);
            border: 1px solid rgba(229,60,17,0.2);
            color: #e53c11;
        }
        .reset-toast--info {
            display: block;
            background: rgba(123,47,255,0.1);
            border: 1px solid rgba(123,47,255,0.2);
            color: #a78bfa;
        }
        .pw-strength {
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.06);
            margin-top: 6px;
            overflow: hidden;
        }
        .pw-strength__bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0%;
        }
        .reset-home-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }
        .reset-home-link:hover {
            color: #a78bfa;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Success State */
        .reset-success {
            display: none;
            text-align: center;
        }
        .reset-success__icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .reset-success__title {
            font-size: 18px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 8px;
        }
        .reset-success__desc {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <!-- Form State -->
    <div id="resetFormState">
        <div class="reset-logo">
            <div class="reset-logo__mark"><i class="ri-lock-password-line" style="color:#fff;"></i></div>
            <div class="reset-logo__text">THE PANG</div>
        </div>

        <h1 class="reset-title">비밀번호 재설정</h1>
        <p class="reset-desc">새로운 비밀번호를 입력해 주세요.</p>

        <div class="reset-field">
            <label>새 비밀번호</label>
            <input type="password" id="resetNewPw" placeholder="8자 이상 입력" oninput="checkPwStrength()">
            <div class="pw-strength"><div class="pw-strength__bar" id="pwStrengthBar"></div></div>
        </div>
        <div class="reset-field">
            <label>비밀번호 확인</label>
            <input type="password" id="resetConfirmPw" placeholder="비밀번호 다시 입력">
        </div>

        <button class="reset-btn" id="resetBtn" onclick="submitResetPassword()">
            <i class="ri-lock-line"></i> 비밀번호 변경
        </button>

        <div id="resetToast" class="reset-toast"></div>
    </div>

    <!-- Success State -->
    <div class="reset-success" id="resetSuccessState">
        <div class="reset-success__icon">✅</div>
        <div class="reset-success__title">비밀번호가 변경되었습니다</div>
        <div class="reset-success__desc">새로운 비밀번호로 로그인해 주세요.</div>
        <a href="/" class="reset-btn" style="display:inline-block; text-decoration:none; text-align:center;">
            <i class="ri-home-line"></i> 홈으로 이동
        </a>
    </div>

    <!-- Loading State (token 확인 중) -->
    <div id="resetLoadingState" style="display:none; text-align:center; padding:40px 0;">
        <div style="display:inline-block;width:32px;height:32px;border:3px solid rgba(123,47,255,.2);border-top-color:#7b2fff;border-radius:50%;animation:spin .6s linear infinite;"></div>
        <p style="margin-top:12px;font-size:13px;color:#888;">인증 확인 중...</p>
    </div>

    <!-- Error State (토큰 만료 등) -->
    <div id="resetErrorState" style="display:none; text-align:center; padding:20px 0;">
        <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
        <h3 style="font-size:16px; color:#e53c11; margin-bottom:8px;">링크가 만료되었습니다</h3>
        <p style="font-size:13px; color:#888; line-height:1.6; margin-bottom:20px;">
            비밀번호 재설정 링크가 만료되었거나 유효하지 않습니다.<br>
            마이페이지에서 다시 요청해 주세요.
        </p>
        <a href="/" class="reset-btn" style="display:inline-block; text-decoration:none; text-align:center;">
            <i class="ri-home-line"></i> 홈으로 이동
        </a>
    </div>

    <a href="/" class="reset-home-link" id="homeLink">← 홈으로 돌아가기</a>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script>
    const { createClient } = supabase;
    const _sb = createClient(PANG_CONFIG.SUPABASE_URL, PANG_CONFIG.SUPABASE_ANON_KEY);

    const formState = document.getElementById('resetFormState');
    const loadingState = document.getElementById('resetLoadingState');
    const errorState = document.getElementById('resetErrorState');
    const successState = document.getElementById('resetSuccessState');

    // 비밀번호 강도 표시
    window.checkPwStrength = function() {
        const pw = document.getElementById('resetNewPw').value;
        const bar = document.getElementById('pwStrengthBar');
        let strength = 0;
        if (pw.length >= 8) strength += 30;
        if (pw.length >= 12) strength += 20;
        if (/[A-Z]/.test(pw)) strength += 15;
        if (/[0-9]/.test(pw)) strength += 15;
        if (/[^A-Za-z0-9]/.test(pw)) strength += 20;

        bar.style.width = strength + '%';
        if (strength < 30) bar.style.background = '#e53c11';
        else if (strength < 60) bar.style.background = '#f59e0b';
        else bar.style.background = '#22c55e';
    };

    // 초기화: 세션 토큰 확인
    (async function init() {
        formState.style.display = 'none';
        loadingState.style.display = 'block';

        try {
            // Supabase v2: URL hash에서 토큰 자동 처리
            const { data: { session }, error } = await _sb.auth.getSession();

            if (error || !session) {
                // 토큰이 아직 처리되지 않았을 수 있으므로 onAuthStateChange 대기
                const { data: { subscription } } = _sb.auth.onAuthStateChange(async (event, session) => {
                    if (event === 'PASSWORD_RECOVERY' && session) {
                        loadingState.style.display = 'none';
                        formState.style.display = 'block';
                        subscription.unsubscribe();
                    } else if (event === 'SIGNED_IN' && session) {
                        loadingState.style.display = 'none';
                        formState.style.display = 'block';
                        subscription.unsubscribe();
                    }
                });

                // 3초 타임아웃
                setTimeout(() => {
                    if (loadingState.style.display !== 'none') {
                        loadingState.style.display = 'none';
                        errorState.style.display = 'block';
                        document.getElementById('homeLink').style.display = 'none';
                    }
                }, 5000);
            } else {
                loadingState.style.display = 'none';
                formState.style.display = 'block';
            }
        } catch (e) {
            console.error('세션 확인 실패:', e);
            loadingState.style.display = 'none';
            errorState.style.display = 'block';
        }
    })();

    // 비밀번호 변경 제출
    window.submitResetPassword = async function() {
        const toast = document.getElementById('resetToast');
        const btn = document.getElementById('resetBtn');
        const newPw = document.getElementById('resetNewPw').value;
        const confirmPw = document.getElementById('resetConfirmPw').value;

        if (!newPw || newPw.length < 8) {
            toast.className = 'reset-toast reset-toast--error';
            toast.textContent = '비밀번호는 8자 이상 입력해 주세요.';
            return;
        }
        if (newPw !== confirmPw) {
            toast.className = 'reset-toast reset-toast--error';
            toast.textContent = '비밀번호가 일치하지 않습니다.';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin .6s linear infinite;display:inline-block;"></i> 변경 중...';
        toast.className = 'reset-toast';

        try {
            const { error } = await _sb.auth.updateUser({ password: newPw });
            if (error) throw error;

            // 성공 화면 표시
            formState.style.display = 'none';
            successState.style.display = 'block';
            document.getElementById('homeLink').style.display = 'none';

        } catch (err) {
            toast.className = 'reset-toast reset-toast--error';
            toast.textContent = '❌ ' + (err.message || '비밀번호 변경 실패');
            btn.disabled = false;
            btn.innerHTML = '<i class="ri-lock-line"></i> 비밀번호 변경';
        }
    };
</script>
</body>
</html>
